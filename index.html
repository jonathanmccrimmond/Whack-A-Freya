<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whack-A-Freddie: Arcade Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Roboto+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Bungee', cursive;
        }
        #game-container {
            width: 100%;
            height: 100%;
            max-width: 100vw;
            max-height: 100vh;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <div id="game-container"></div>
    <script>
        /**
         * Sound Service for Whack-A-Freddie
         * Synthesizes arcade-style sound effects using the Web Audio API.
         */
        class SoundService {
            constructor() {
                this.ctx = null;
            }

            init() {
                if (!this.ctx) {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (this.ctx.state === 'suspended') {
                    this.ctx.resume();
                }
            }

            createGain(start, duration) {
                if (!this.ctx) return null;
                const gain = this.ctx.createGain();
                gain.gain.setValueAtTime(start, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
                gain.connect(this.ctx.destination);
                return gain;
            }

            playHitBoing(state) {
                this.init();
                if (!this.ctx) return;

                const now = this.ctx.currentTime;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                gain.connect(this.ctx.destination);

                let baseFreq = 200;
                let sweepMult = 2.5;
                
                if (state === 'shocked') {
                    baseFreq = 300;
                    sweepMult = 3.0;
                    osc.type = 'triangle';
                } else if (state === 'annoyed') {
                    baseFreq = 450;
                    sweepMult = 2.0;
                    osc.type = 'square';
                } else {
                    osc.type = 'sine';
                }

                osc.frequency.setValueAtTime(baseFreq, now);
                osc.frequency.exponentialRampToValueAtTime(baseFreq * sweepMult, now + 0.05);
                osc.frequency.exponentialRampToValueAtTime(baseFreq * 1.2, now + 0.2);
                
                osc.connect(gain);
                osc.start();
                osc.stop(now + 0.2);
            }

            playDecoyBoing() {
                this.init();
                if (!this.ctx) return;

                const now = this.ctx.currentTime;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                
                gain.gain.setValueAtTime(0.4, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                gain.connect(this.ctx.destination);

                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.exponentialRampToValueAtTime(60, now + 0.2);
                
                osc.connect(gain);
                osc.start();
                osc.stop(now + 0.3);
            }

            playMiss() {
                this.init();
                if (!this.ctx) return;

                const bufferSize = this.ctx.sampleRate * 0.1;
                const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    data[i] = Math.random() * 2 - 1;
                }

                const noise = this.ctx.createBufferSource();
                noise.buffer = buffer;

                const filter = this.ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(1000, this.ctx.currentTime);
                filter.frequency.exponentialRampToValueAtTime(100, this.ctx.currentTime + 0.1);

                const gain = this.createGain(0.2, 0.1);
                if (!gain) return;

                noise.connect(filter);
                filter.connect(gain);
                noise.start();
            }

            playSpawn() {
                this.init();
                if (!this.ctx) return;

                const osc = this.ctx.createOscillator();
                const gain = this.createGain(0.3, 0.05);
                if (!gain) return;

                osc.type = 'sine';
                osc.frequency.setValueAtTime(880, this.ctx.currentTime);
                
                osc.connect(gain);
                osc.start();
                osc.stop(this.ctx.currentTime + 0.05);
            }

            playTick() {
                this.init();
                if (!this.ctx) return;

                const osc = this.ctx.createOscillator();
                const gain = this.createGain(0.2, 0.05);
                if (!gain) return;

                osc.type = 'sine';
                osc.frequency.setValueAtTime(60, this.ctx.currentTime);
                
                osc.connect(gain);
                osc.start();
                osc.stop(this.ctx.currentTime + 0.05);
            }

            playCombo(count) {
                this.init();
                if (!this.ctx) return;

                const osc = this.ctx.createOscillator();
                const gain = this.createGain(0.3, 0.15);
                if (!gain) return;

                const baseFreq = 440;
                const freq = baseFreq * Math.pow(1.05946, count % 12);
                
                osc.type = 'square';
                osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(freq * 1.2, this.ctx.currentTime + 0.1);
                
                osc.connect(gain);
                osc.start();
                osc.stop(this.ctx.currentTime + 0.15);
            }

            playJackpot() {
                this.init();
                if (!this.ctx) return;

                const now = this.ctx.currentTime;
                [0, 0.05, 0.1, 0.15].forEach((delay, i) => {
                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();
                    gain.gain.setValueAtTime(0.2, now + delay);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + delay + 0.2);
                    gain.connect(this.ctx.destination);

                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(1000 + (i * 200), now + delay);
                    
                    osc.connect(gain);
                    osc.start(now + delay);
                    osc.stop(now + delay + 0.2);
                });
            }

            playGameOver() {
                this.init();
                if (!this.ctx) return;

                const osc = this.ctx.createOscillator();
                const gain = this.createGain(0.5, 0.5);
                if (!gain) return;

                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(200, this.ctx.currentTime);
                osc.frequency.linearRampToValueAtTime(50, this.ctx.currentTime + 0.5);
                
                osc.connect(gain);
                osc.start();
                osc.stop(this.ctx.currentTime + 0.5);
            }

            playClick() {
                this.init();
                if (!this.ctx) return;

                const osc = this.ctx.createOscillator();
                const gain = this.createGain(0.2, 0.02);
                if (!gain) return;

                osc.type = 'sine';
                osc.frequency.setValueAtTime(1500, this.ctx.currentTime);
                
                osc.connect(gain);
                osc.start();
                osc.stop(this.ctx.currentTime + 0.02);
            }

            playStart() {
                this.init();
                if (!this.ctx) return;

                const now = this.ctx.currentTime;
                const freqs = [440, 554.37, 659.25, 880];
                freqs.forEach((f, i) => {
                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();
                    gain.gain.setValueAtTime(0.2, now + (i * 0.05));
                    gain.gain.exponentialRampToValueAtTime(0.01, now + (i * 0.05) + 0.3);
                    gain.connect(this.ctx.destination);

                    osc.type = 'square';
                    osc.frequency.setValueAtTime(f, now + (i * 0.05));
                    
                    osc.connect(gain);
                    osc.start(now + (i * 0.05));
                    osc.stop(now + (i * 0.05) + 0.3);
                });
            }
        }

        const sounds = new SoundService();

        const CONFIG = {
            width: 1080,
            height: 1920,
            gridSize: 3,
            holeRadius: 140,
            spawnIntervalMin: 500,
            spawnIntervalMax: 1000,
            displayDuration: 750,
            gameDuration: 60
        };

        const DEPTH = {
            BACKGROUND: -10,
            VIGNETTE: -9,
            GRID_SHADOW: -8,
            HOLES: -7,
            SPOTLIGHT: -6,
            NEPHEW: 0,
            UI: 10
        };

        // --- TITLE SCENE ---
        class TitleScene extends Phaser.Scene {
            constructor() {
                super('TitleScene');
            }

            preload() {
                const graphics = this.add.graphics();
                graphics.fillStyle(0xffffff, 1);
                graphics.fillCircle(4, 4, 4);
                graphics.generateTexture('star', 8, 8);
                graphics.destroy();

                const planetGraphics = this.add.graphics();
                planetGraphics.fillGradientStyle(0xff5500, 0xffaa00, 0xaa4400, 0x882200, 1);
                planetGraphics.fillCircle(32, 32, 32);
                planetGraphics.generateTexture('planet', 64, 64);
                planetGraphics.destroy();
            }

            create() {
                const { width, height } = this.cameras.main;

                const bg = this.add.graphics();
                bg.fillGradientStyle(0x1a0a33, 0x1a0a33, 0x0a0a2a, 0x05051a, 1);
                bg.fillRect(0, 0, width, height);

                for (let i = 0; i < 150; i++) {
                    const x = Phaser.Math.Between(0, width);
                    const y = Phaser.Math.Between(0, height);
                    const star = this.add.image(x, y, 'star');
                    star.setAlpha(Phaser.Math.FloatBetween(0.1, 0.5));
                    star.setScale(Phaser.Math.FloatBetween(0.2, 0.8));
                    this.tweens.add({
                        targets: star,
                        alpha: 0.8,
                        duration: Phaser.Math.Between(1000, 3000),
                        yoyo: true,
                        repeat: -1,
                        ease: 'Sine.easeInOut'
                    });
                }

                for (let i = 0; i < 5; i++) {
                    const x = Phaser.Math.Between(100, width - 100);
                    const y = Phaser.Math.Between(100, height - 100);
                    const planet = this.add.image(x, y, 'planet');
                    planet.setAlpha(0.6);
                    planet.setScale(Phaser.Math.FloatBetween(0.5, 1.5));
                    planet.setTint(Phaser.Math.Between(0x888888, 0xffffff));
                    this.tweens.add({
                        targets: planet,
                        y: y + 50,
                        x: x + 20,
                        duration: Phaser.Math.Between(5000, 10000),
                        yoyo: true,
                        repeat: -1,
                        ease: 'Sine.easeInOut'
                    });
                }

                const title = this.add.text(width / 2, height * 0.3, 'WHACK-A\nFREDDIE', {
                    fontFamily: 'Bungee, cursive',
                    fontSize: '160px',
                    color: '#ffffff',
                    stroke: '#0a0a2a',
                    strokeThickness: 20,
                    align: 'center',
                    shadow: { offsetX: 10, offsetY: 10, color: '#000000', blur: 15, stroke: true, fill: true }
                }).setOrigin(0.5);

                const highScore = localStorage.getItem('freddie_high_score_arcade') || '0';
                this.add.text(width / 2, height * 0.5, `BEST: ${highScore}`, {
                    fontFamily: 'Roboto Mono, monospace',
                    fontSize: '50px',
                    color: '#ffcc00',
                    stroke: '#000',
                    strokeThickness: 5
                }).setOrigin(0.5);

                const startBtn = this.add.container(width / 2, height * 0.65);
                const btnGlow = this.add.graphics();
                btnGlow.fillStyle(0x00ffcc, 0.3);
                btnGlow.fillRoundedRect(-320, -100, 640, 200, 40);
                const btnBg = this.add.rectangle(0, 0, 600, 160, 0x00ffcc).setInteractive({ useHandCursor: true });
                const btnText = this.add.text(0, 0, 'START GAME', { 
                    fontFamily: 'Bungee, cursive', 
                    fontSize: '70px', 
                    color: '#0a0a2a' 
                }).setOrigin(0.5);
                startBtn.add([btnGlow, btnBg, btnText]);

                this.tweens.add({
                    targets: btnGlow,
                    alpha: 0.6,
                    scale: 1.05,
                    duration: 1000,
                    yoyo: true,
                    repeat: -1,
                    ease: 'Sine.easeInOut'
                });

                btnBg.on('pointerdown', () => {
                    sounds.playStart();
                    this.tweens.add({
                        targets: startBtn,
                        scale: 0.9,
                        duration: 100,
                        yoyo: true,
                        onComplete: () => this.scene.start('MainScene')
                    });
                });

                this.tweens.add({
                    targets: title,
                    y: title.y + 20,
                    duration: 2500,
                    yoyo: true,
                    repeat: -1,
                    ease: 'Sine.easeInOut'
                });
            }
        }

        // --- MAIN GAMEPLAY SCENE ---
        class MainScene extends Phaser.Scene {
            constructor() {
                super('MainScene');
            }

            preload() {
                this.load.image('calm', 'calm.png');
                this.load.image('shocked', 'shocked.png');
                this.load.image('annoyed', 'annoyed.png');
                this.load.image('sleeping', 'sleeping.png');
            }

            init() {
                this.score = 0;
                this.timeLeft = CONFIG.gameDuration;
                this.combo = 0;
                this.multiplier = 1;
                this.holes = [];
                this.activeNephew = null;
                this.activeSpotlight = null;
                this.isGameOver = false;
            }

            create() {
                const { width, height } = this.cameras.main;

                const bg = this.add.graphics();
                bg.fillGradientStyle(0x1a0a33, 0x1a0a33, 0x0a0a2a, 0x05051a, 1);
                bg.fillRect(0, 0, width, height);
                bg.setDepth(DEPTH.BACKGROUND);

                for (let i = 0; i < 150; i++) {
                    const x = Phaser.Math.Between(0, width);
                    const y = Phaser.Math.Between(0, height);
                    const star = this.add.image(x, y, 'star');
                    star.setAlpha(Phaser.Math.FloatBetween(0.1, 0.5));
                    star.setScale(Phaser.Math.FloatBetween(0.2, 0.8));
                    star.setDepth(DEPTH.BACKGROUND + 1);
                    this.tweens.add({
                        targets: star,
                        alpha: 0.8,
                        duration: Phaser.Math.Between(1000, 3000),
                        yoyo: true,
                        repeat: -1,
                        ease: 'Sine.easeInOut'
                    });
                }

                for (let i = 0; i < 5; i++) {
                    const x = Phaser.Math.Between(100, width - 100);
                    const y = Phaser.Math.Between(100, height - 100);
                    const planet = this.add.image(x, y, 'planet');
                    planet.setAlpha(0.4);
                    planet.setScale(Phaser.Math.FloatBetween(0.5, 1.5));
                    planet.setTint(Phaser.Math.Between(0x888888, 0xffffff));
                    planet.setDepth(DEPTH.BACKGROUND + 2);
                    this.tweens.add({
                        targets: planet,
                        y: y + 50,
                        x: x + 20,
                        duration: Phaser.Math.Between(5000, 10000),
                        yoyo: true,
                        repeat: -1,
                        ease: 'Sine.easeInOut'
                    });
                }

                this.createVignette();
                this.createBackgroundParticles();
                this.createUI();
                this.createGrid();
                this.showIntro();
            }

            createVignette() {
                const { width, height } = this.cameras.main;
                const vignette = this.add.graphics();
                vignette.fillStyle(0x000000, 1);
                vignette.fillRect(0, 0, width, height);
                vignette.setAlpha(0.2);
                vignette.setBlendMode(Phaser.BlendModes.MULTIPLY);
                vignette.setDepth(DEPTH.VIGNETTE);
            }

            showIntro() {
                const { width, height } = this.cameras.main;
                const readyText = this.add.text(width / 2, height / 2, 'READY?', { 
                    fontSize: '200px', 
                    color: '#ffff00', 
                    stroke: '#000', 
                    strokeThickness: 20 
                }).setOrigin(0.5).setScale(0);

                this.tweens.add({
                    targets: readyText,
                    scale: 1,
                    duration: 500,
                    ease: 'Back.easeOut',
                    onComplete: () => {
                        this.time.delayedCall(500, () => {
                            readyText.setText('GO!');
                            readyText.setColor('#00ff00');
                            this.tweens.add({
                                targets: readyText,
                                scale: 2,
                                alpha: 0,
                                duration: 500,
                                ease: 'Power2',
                                onComplete: () => {
                                    readyText.destroy();
                                    this.startGame();
                                }
                            });
                        });
                    }
                });
            }

            startGame() {
                this.time.addEvent({
                    delay: 1000,
                    callback: this.updateTimer,
                    callbackScope: this,
                    loop: true
                });
                this.scheduleNextSpawn();
                this.input.on('pointerdown', (pointer, currentlyOver) => {
                    if (currentlyOver.length === 0) {
                        this.handleMiss(pointer.x, pointer.y);
                    }
                });
            }

            createBackgroundParticles() {
                const graphics = this.add.graphics();
                graphics.fillStyle(0xffffff, 1);
                graphics.fillCircle(10, 10, 10);
                graphics.generateTexture('particle', 20, 20);
                graphics.destroy();

                const particles = this.add.particles(0, 0, 'particle', {
                    x: { min: 0, max: CONFIG.width },
                    y: { min: 0, max: CONFIG.height },
                    scale: { min: 0.2, max: 0.8 },
                    alpha: { start: 0.1, end: 0 },
                    speed: { min: 5, max: 15 },
                    angle: { min: 0, max: 360 },
                    rotate: { min: 0, max: 360 },
                    lifespan: 8000,
                    frequency: 1000,
                    blendMode: 'ADD'
                });
                particles.setDepth(DEPTH.BACKGROUND + 1);
            }

            createUI() {
                const { width } = this.cameras.main;
                this.titleText = this.add.text(width / 2, 350, 'WHACK-A-FREDDIE', { 
                    fontFamily: 'Bungee, cursive', 
                    fontSize: '110px', 
                    color: '#ffffff',
                    stroke: '#000',
                    strokeThickness: 12,
                    align: 'center'
                }).setOrigin(0.5);
                this.scoreText = this.add.text(width / 2, 530, '00000', { 
                    fontFamily: 'Roboto Mono, monospace', 
                    fontSize: '140px', 
                    color: '#00ffcc',
                    stroke: '#000',
                    strokeThickness: 10
                }).setOrigin(0.5);
                this.add.text(width / 2, 440, 'SCORE', { fontSize: '40px', color: '#ffffff' }).setOrigin(0.5);
                this.timerText = this.add.text(width / 2, 670, '60', { 
                    fontSize: '100px', 
                    color: '#ff0055',
                    stroke: '#000',
                    strokeThickness: 5
                }).setOrigin(0.5);
                this.comboContainer = this.add.container(width / 2, 800);
                this.comboText = this.add.text(0, 0, 'COMBO: 0', { fontSize: '60px', color: '#ffcc00' }).setOrigin(0.5);
                this.multiplierText = this.add.text(0, 80, 'x1', { fontSize: '80px', color: '#00ff00', fontWeight: 'bold' }).setOrigin(0.5);
                this.comboContainer.add([this.comboText, this.multiplierText]);
                this.comboContainer.setAlpha(0);
                this.titleText.setDepth(DEPTH.UI);
                this.scoreText.setDepth(DEPTH.UI);
                this.timerText.setDepth(DEPTH.UI);
                this.comboContainer.setDepth(DEPTH.UI);
            }

            createGrid() {
                const { width, height } = this.cameras.main;
                const startX = width / 2 - 320;
                const startY = height / 2 + 100;
                const spacing = 320;
                for (let row = 0; row < CONFIG.gridSize; row++) {
                    for (let col = 0; col < CONFIG.gridSize; col++) {
                        const x = startX + col * spacing;
                        const y = startY + row * spacing;
                        this.add.ellipse(x, y + 15, CONFIG.holeRadius * 2.1, CONFIG.holeRadius * 1.3, 0x000000, 0.4).setDepth(DEPTH.HOLES - 1);
                        const hole = this.add.graphics();
                        hole.fillStyle(0x0a0a0a, 1);
                        hole.fillEllipse(x, y, CONFIG.holeRadius * 2, CONFIG.holeRadius * 1.2);
                        hole.lineStyle(4, 0x666666, 0.8);
                        hole.strokeEllipse(x, y, CONFIG.holeRadius * 2, CONFIG.holeRadius * 1.2);
                        hole.lineStyle(8, 0x000000, 0.5);
                        hole.strokeEllipse(x, y + 5, CONFIG.holeRadius * 1.9, CONFIG.holeRadius * 1.1);
                        hole.setDepth(DEPTH.HOLES);
                        const hitArea = this.add.ellipse(x, y, CONFIG.holeRadius * 2, CONFIG.holeRadius * 1.2).setInteractive();
                        hitArea.on('pointerdown', () => this.handleMiss(x, y));
                        this.holes.push({ x, y, hitArea });
                    }
                }
            }

            updateTimer() {
                if (this.isGameOver) return;
                this.timeLeft--;
                this.timerText.setText(this.timeLeft.toString().padStart(2, '0'));
                if (this.timeLeft <= 10) {
                    sounds.playTick();
                    this.timerText.setColor('#ff0000');
                    this.tweens.add({ targets: this.timerText, scale: 1.2, duration: 200, yoyo: true });
                }
                if (this.timeLeft <= 0) this.endGame();
            }

            scheduleNextSpawn() {
                if (this.isGameOver) return;
                const delay = Phaser.Math.Between(CONFIG.spawnIntervalMin, CONFIG.spawnIntervalMax);
                this.time.delayedCall(delay, this.spawnNephew, [], this);
            }

            spawnNephew() {
                if (this.isGameOver) return;
                if (this.activeNephew) this.activeNephew.destroy();
                if (this.activeSpotlight) this.activeSpotlight.destroy();
                const hole = Phaser.Utils.Array.GetRandom(this.holes);
                const typeRoll = Math.random();
                let type = typeRoll < 0.15 ? 'decoy' : 'normal';
                const spotlight = this.add.graphics();
                spotlight.fillStyle(0x00ffcc, 1);
                spotlight.fillCircle(hole.x, hole.y, CONFIG.holeRadius * 1.5);
                spotlight.setAlpha(0);
                spotlight.setBlendMode(Phaser.BlendModes.ADD);
                spotlight.setDepth(DEPTH.SPOTLIGHT);
                this.tweens.add({ targets: spotlight, alpha: 0.1, duration: 150 });
                this.activeSpotlight = spotlight;
                sounds.playSpawn();
                const nephew = this.createNephewGraphic(hole.x, hole.y, type);
                nephew.type = type;
                nephew.setDepth(DEPTH.NEPHEW);
                nephew.setInteractive(new Phaser.Geom.Circle(0, 0, 100), Phaser.Geom.Circle.Contains);
                nephew.on('pointerdown', (pointer, localX, localY, event) => {
                    event.stopPropagation();
                    this.handleHit(nephew, spotlight);
                });
                this.activeNephew = nephew;
                this.time.delayedCall(CONFIG.displayDuration, () => {
                    if (this.activeNephew === nephew) {
                        this.tweens.add({
                            targets: [nephew, spotlight],
                            alpha: 0,
                            duration: 100,
                            onComplete: () => {
                                nephew.destroy();
                                spotlight.destroy();
                                if (this.activeNephew === nephew) this.activeNephew = null;
                                if (this.activeSpotlight === spotlight) this.activeSpotlight = null;
                                if (type !== 'decoy') {
                                    this.score = Math.max(0, this.score - 1);
                                    this.resetCombo();
                                    this.updateUI();
                                }
                                this.scheduleNextSpawn();
                            }
                        });
                    }
                });
            }

            createNephewGraphic(x, y, type) {
                const container = this.add.container(x, y + 50);
                let textureKey = type === 'decoy' ? 'sleeping' : (this.combo >= 6 ? 'annoyed' : (this.combo >= 3 ? 'shocked' : 'calm'));
                const img = this.add.image(0, 0, textureKey).setDisplaySize(220, 220);
                container.add(img);
                this.tweens.add({ targets: container, y: y - 80, duration: 150, ease: 'Back.easeOut' });
                return container;
            }

            handleHit(nephew, spotlight) {
                if (this.isGameOver) return;
                const type = nephew.type;
                const x = nephew.x;
                const y = nephew.y;
                nephew.destroy();
                if (spotlight) {
                    this.tweens.add({ targets: spotlight, alpha: 0, duration: 100, onComplete: () => spotlight.destroy() });
                }
                this.activeNephew = null;
                this.activeSpotlight = null;
                this.cameras.main.shake(100, 0.01);
                if (type === 'decoy') {
                    sounds.playDecoyBoing();
                    this.score = Math.max(0, this.score - 1);
                    this.resetCombo();
                    this.showFloatingText(x, y, 'BAD! -1', '#ff0000');
                    this.createExplosion(x, y, 0xff0000);
                } else {
                    if (this.combo >= 5) {
                        sounds.playJackpot();
                    } else {
                        const state = this.combo >= 6 ? 'annoyed' : (this.combo >= 3 ? 'shocked' : 'calm');
                        sounds.playHitBoing(state);
                    }
                    this.combo++;
                    this.updateMultiplier();
                    const totalPoints = 1 * this.multiplier;
                    this.score += totalPoints;
                    this.showFloatingText(x, y, `+${totalPoints}`, '#00ffcc');
                    this.createExplosion(x, y, 0x00ffcc);
                    if (this.combo >= 3) {
                        this.comboContainer.setAlpha(1);
                        this.tweens.add({ targets: this.comboContainer, scale: 1.2, duration: 100, yoyo: true });
                    }
                }
                this.updateUI();
                this.scheduleNextSpawn();
            }

            handleMiss(x, y) {
                if (this.isGameOver) return;
                sounds.playMiss();
                this.score = Math.max(0, this.score - 1);
                this.resetCombo();
                this.updateUI();
                this.showFloatingText(x, y, 'MISS -1', '#888888');
                this.cameras.main.flash(50, 100, 0, 0, 0.2);
            }

            createExplosion(x, y, color) {
                for (let i = 0; i < 12; i++) {
                    const angle = Phaser.Math.DegToRad(i * 30);
                    const dist = Phaser.Math.Between(50, 150);
                    const circle = this.add.circle(x, y, Phaser.Math.Between(5, 15), color);
                    this.tweens.add({
                        targets: circle,
                        x: x + Math.cos(angle) * dist,
                        y: y + Math.sin(angle) * dist,
                        alpha: 0, scale: 0, duration: 400,
                        onComplete: () => circle.destroy()
                    });
                }
            }

            resetCombo() {
                if (this.combo > 0) this.tweens.add({ targets: this.comboContainer, alpha: 0, scale: 0.5, duration: 200 });
                this.combo = 0;
                this.multiplier = 1;
                this.updateUI();
            }

            updateMultiplier() {
                if (this.combo >= 6) this.multiplier = 3;
                else if (this.combo >= 3) this.multiplier = 2;
                else this.multiplier = 1;
            }

            updateUI() {
                this.scoreText.setText(this.score.toString().padStart(5, '0'));
                this.comboText.setText(`COMBO: ${this.combo}`);
                this.multiplierText.setText(`x${this.multiplier}`);
                if (this.multiplier > 1) this.multiplierText.setColor(this.multiplier >= 3 ? '#ff00ff' : '#00ff00');
            }

            showFloatingText(x, y, text, color, scale = 1) {
                const txt = this.add.text(x, y, text, { fontSize: '80px', color: color, fontWeight: 'bold', stroke: '#000', strokeThickness: 5 }).setOrigin(0.5).setScale(scale);
                txt.setDepth(DEPTH.UI + 1);
                this.tweens.add({ targets: txt, y: y - 200, alpha: 0, scale: scale * 1.5, duration: 600, onComplete: () => txt.destroy() });
            }

            endGame() {
                this.isGameOver = true;
                sounds.playGameOver();
                if (this.activeNephew) this.activeNephew.destroy();
                if (this.activeSpotlight) this.activeSpotlight.destroy();
                const highScore = localStorage.getItem('freddie_high_score_arcade') || '0';
                if (this.score > parseInt(highScore)) localStorage.setItem('freddie_high_score_arcade', this.score.toString());
                this.scene.start('GameOverScene', { score: this.score, highScore: Math.max(this.score, parseInt(highScore)) });
            }
        }

        // --- GAME OVER SCENE ---
        class GameOverScene extends Phaser.Scene {
            constructor() {
                super('GameOverScene');
            }

            create(data) {
                const { width, height } = this.cameras.main;
                this.add.rectangle(width / 2, height / 2, width, height, 0x000000, 0.9);
                this.add.text(width / 2, height / 2 - 400, 'GAME OVER', { fontSize: '140px', color: '#ff0055', stroke: '#fff', strokeThickness: 10 }).setOrigin(0.5);
                this.add.text(width / 2, height / 2 - 150, `FINAL SCORE`, { fontSize: '50px', color: '#aaa' }).setOrigin(0.5);
                this.add.text(width / 2, height / 2 - 50, `${data.score}`, { fontSize: '120px', color: '#00ffcc' }).setOrigin(0.5);
                this.add.text(width / 2, height / 2 + 100, `BEST: ${data.highScore}`, { fontSize: '60px', color: '#ffcc00' }).setOrigin(0.5);
                const restartBtn = this.add.container(width / 2, height / 2 + 350);
                const bg = this.add.rectangle(0, 0, 600, 150, 0x00ffcc).setInteractive();
                const txt = this.add.text(0, 0, 'PLAY AGAIN', { fontSize: '60px', color: '#000' }).setOrigin(0.5);
                restartBtn.add([bg, txt]);
                bg.on('pointerdown', () => {
                    sounds.playClick();
                    this.tweens.add({ targets: restartBtn, scale: 0.9, duration: 50, yoyo: true, onComplete: () => this.scene.start('MainScene') });
                });
                this.time.addEvent({
                    delay: 200,
                    callback: () => {
                        const x = Phaser.Math.Between(0, width);
                        const y = Phaser.Math.Between(0, height);
                        const star = this.add.star(x, y, 5, 5, 15, 0xffffff);
                        this.tweens.add({ targets: star, alpha: 0, scale: 2, duration: 500, onComplete: () => star.destroy() });
                    },
                    loop: true
                });
            }
        }

        const config = {
            type: Phaser.AUTO,
            parent: 'game-container',
            width: CONFIG.width,
            height: CONFIG.height,
            scale: {
                mode: Phaser.Scale.FIT,
                autoCenter: Phaser.Scale.CENTER_BOTH
            },
            scene: [TitleScene, MainScene, GameOverScene],
            backgroundColor: '#0a0a0a'
        };

        new Phaser.Game(config);
    </script>
</body>
</html>
